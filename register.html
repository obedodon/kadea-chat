<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Créer un compte — Kadea Chat</title>

    <!-- Chargement immédiat du thème -->
    <script>
        (() => {
            const savedTheme = localStorage.getItem("theme");

            const prefersDark =
                window.matchMedia("(prefers-color-scheme: dark)").matches;

            const isDark =
                savedTheme === "dark" ||
                (!savedTheme && prefersDark);

            document.documentElement.classList.toggle("dark", isDark);
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
        };
    </script>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    >
</head>

<body
    class="min-h-screen flex items-center justify-center bg-slate-50 px-4 py-8 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-white"
>

<main class="w-full max-w-md">

    <!-- Logo -->
    <header class="text-center mb-6">

        <div
            class="w-14 h-14 mx-auto rounded-xl bg-blue-600 flex items-center justify-center text-white text-2xl shadow-lg shadow-blue-600/20"
        >
            <i class="fa-solid fa-comments"></i>
        </div>

        <h1
            class="text-2xl font-bold text-blue-600 mt-4"
        >
            Kadea Chat
        </h1>

        <p
            class="text-sm text-slate-500 mt-2 dark:text-slate-300"
        >
            Crée ton compte gratuitement.
        </p>

    </header>

    <!-- Carte -->

    <section
        class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 transition-colors"
    >

        <form
            id="registerForm"
            class="space-y-4"
            novalidate
        >

            <!-- Nom -->

            <div>

                <label
                    for="fullName"
                    class="block mb-1 text-sm font-medium text-slate-700 dark:text-slate-200"
                >
                    Nom complet
                </label>

                <input
                    id="fullName"
                    name="fullName"
                    type="text"
                    required
                    autocomplete="name"
                    placeholder="Obed Mungwana"
                    class="w-full rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900"
                >

            </div>

            <!-- Email -->

            <div>

                <label
                    for="email"
                    class="block mb-1 text-sm font-medium text-slate-700 dark:text-slate-200"
                >
                    Adresse e-mail
                </label>

                <input
                    id="email"
                    name="email"
                    type="email"
                    required
                    autocomplete="email"
                    placeholder="nom@exemple.com"
                    class="w-full rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900"
                >

            </div>

            <!-- Mot de passe -->

            <div>

                <label
                    for="password"
                    class="block mb-1 text-sm font-medium text-slate-700 dark:text-slate-200"
                >
                    Mot de passe
                </label>

                <div class="relative">

                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                        minlength="8"
                        autocomplete="new-password"
                        placeholder="Minimum 8 caractères"
                        class="w-full rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-4 py-3 pr-12 outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900"
                    >

                    <button
                        id="togglePassword"
                        type="button"
                        aria-label="Afficher le mot de passe"
                        class="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition"
                    >
                        <i class="fa-solid fa-eye"></i>
                    </button>

                </div>

            </div>

            <!-- Confirmation -->

            <div>

                <label
                    for="confirmPassword"
                    class="block mb-1 text-sm font-medium text-slate-700 dark:text-slate-200"
                >
                    Confirmation
                </label>

                <div class="relative">

                    <input
                        id="confirmPassword"
                        name="confirmPassword"
                        type="password"
                        required
                        minlength="8"
                        autocomplete="new-password"
                        placeholder="Confirme ton mot de passe"
                        class="w-full rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-4 py-3 pr-12 outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900"
                    >

                    <button
                        id="toggleConfirmPassword"
                        type="button"
                        aria-label="Afficher le mot de passe"
                        class="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition"
                    >
                        <i class="fa-solid fa-eye"></i>
                    </button>

                </div>

            </div>

            <!-- Message -->

            <p
                id="message"
                class="min-h-5 text-center text-sm font-medium"
                aria-live="polite"
            ></p>

            <!-- Bouton -->

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 transition text-white font-semibold py-3 rounded-lg focus:ring-4 focus:ring-blue-200 dark:focus:ring-blue-900 disabled:opacity-70 disabled:cursor-not-allowed"
            >
                Créer mon compte
            </button>

        </form>

        <!-- Connexion -->

        <p
            class="text-center text-sm text-slate-500 dark:text-slate-300 mt-5"
        >

            Tu possèdes déjà un compte ?

            <a
                href="login.html"
                class="text-blue-600 font-semibold hover:underline"
            >
                Se connecter
            </a>

        </p>

    </section>

    <p
        class="text-center text-xs text-slate-400 dark:text-slate-500 mt-5"
    >
        Kadea Chat © 2026
    </p>

</main>

<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
