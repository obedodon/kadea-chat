<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Kadea Chat</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="auth-container">
    <section class="auth-card">
      <h1>Kadea Chat</h1>
      <h2>Créer un compte</h2>

      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Nom complet</label>
          <input type="text" id="fullName" placeholder="Ex: Mungwana Obed">
        </div>

        <div class="form-group">
          <label for="email">Adresse email</label>
          <input type="email" id="email" placeholder="Ex: obed@email.com">
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="Votre mot de passe">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <input type="password" id="confirmPassword" placeholder="Confirmez le mot de passe">
        </div>

        <p id="message"></p>

        <button type="submit">S'inscrire</button>
      </form>

      <p class="auth-link">
        Déjà un compte ?
        <a href="login.html">Se connecter</a>
      </p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
