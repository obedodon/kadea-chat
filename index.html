<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - Kadea Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="h-screen bg-slate-100 overflow-hidden">
  <main class="h-screen flex">

    <aside class="w-16 bg-white border-r border-slate-200 flex flex-col items-center justify-between py-4">
      <div class="space-y-6">
        <div class="w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center">
          <i class="fa-solid fa-comments"></i>
        </div>

        <nav class="flex flex-col items-center gap-5 text-slate-500">
          <button class="text-blue-600"><i class="fa-solid fa-message"></i></button>
          <a href="profile.html"><i class="fa-solid fa-user"></i></a>
          <button><i class="fa-solid fa-gear"></i></button>
        </nav>
      </div>

      <button onclick="logout()" class="text-red-500 hover:text-red-600">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </aside>

    <section class="w-80 bg-white border-r border-slate-200 flex flex-col">
      <div class="p-4 border-b border-slate-200">
        <h1 class="text-xl font-bold text-blue-600 mb-4">Kadea Chat</h1>

        <div class="relative">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
          <input id="searchConversation" type="text" placeholder="Search conversations..."
            class="w-full bg-slate-100 rounded-lg pl-10 pr-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <div id="conversationsList" class="flex-1 overflow-y-auto">
        <p class="p-4 text-sm text-slate-500">Chargement des conversations...</p>
      </div>
    </section>

    <section class="flex-1 flex flex-col bg-slate-50">
      <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div id="chatAvatar" class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center font-bold text-blue-700">
            KC
          </div>
          <div>
            <h2 id="chatName" class="font-semibold text-slate-900">Sélectionne une conversation</h2>
            <p class="text-xs text-green-600">● Online</p>
          </div>
        </div>

        <div class="flex items-center gap-5 text-slate-500">
          <button><i class="fa-solid fa-video"></i></button>
          <button><i class="fa-solid fa-phone"></i></button>
          <button><i class="fa-solid fa-ellipsis-vertical"></i></button>
        </div>
      </header>

      <div id="messagesContainer" class="flex-1 p-6 overflow-y-auto space-y-5">
        <div class="h-full flex items-center justify-center text-slate-400">
          Clique sur une conversation pour afficher les messages.
        </div>
      </div>

      <footer class="bg-white border-t border-slate-200 p-4">
        <form id="messageForm" class="flex items-center gap-3">
          <button type="button" class="text-slate-400 hover:text-blue-600">
            <i class="fa-regular fa-face-smile text-xl"></i>
          </button>

          <input id="messageInput" type="text" placeholder="Type a message..."
            class="flex-1 bg-slate-100 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" />

          <button type="submit" class="w-11 h-11 bg-blue-600 hover:bg-blue-700 text-white rounded-full">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </footer>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/conversations.js"></script>
</body>
</html>
