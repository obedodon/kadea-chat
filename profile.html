<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Profil - Kadea Chat</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>


<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">


<main class="w-full max-w-xl bg-white rounded-2xl shadow p-8">


  <!-- HEADER -->
  <div class="flex items-center justify-between mb-8">

    <a href="index.html"
      class="text-blue-600 hover:text-blue-700 transition">

      <i class="fa-solid fa-arrow-left"></i>
      Retour au chat

    </a>


    <button
      id="logoutBtn"
      class="text-red-500 hover:text-red-600 transition">

      <i class="fa-solid fa-right-from-bracket text-xl"></i>

    </button>


  </div>



  <!-- PHOTO PROFIL -->
  <section class="text-center mb-8">


    <button
      id="avatarButton"
      class="relative mx-auto block group">


      <div
        id="profileAvatar"
        class="w-28 h-28 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-4xl font-bold overflow-hidden cursor-pointer">

        KC

      </div>


      <!-- effet au survol -->
      <div
        class="absolute inset-0 bg-black/30 rounded-full hidden group-hover:flex items-center justify-center text-white">

        <i class="fa-solid fa-eye text-2xl"></i>

      </div>


    </button>


    <p class="text-xs text-slate-400 mt-2">
      Clique sur la photo pour l'agrandir
    </p>


    <h1
      id="profileName"
      class="text-2xl font-bold text-slate-900 mt-4">

      Chargement...

    </h1>


    <p
      id="profileEmail"
      class="text-slate-500 mt-1">

      ...

    </p>


  </section>




  <!-- FORMULAIRE -->
  <form id="profileForm" class="space-y-5">


    <div>

      <label class="text-sm font-medium text-slate-700">
        Nom complet
      </label>


      <input
        id="fullName"
        type="text"
        class="mt-2 w-full bg-slate-100 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"
      />

    </div>



    <div>

      <label class="text-sm font-medium text-slate-700">
        Photo de profil URL
      </label>


      <input
        id="avatarUrl"
        type="text"
        placeholder="https://image..."
        class="mt-2 w-full bg-slate-100 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"
      />

    </div>



    <p
      id="profileMessage"
      class="text-center text-sm font-medium">
    </p>




    <button
      type="submit"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-3 font-semibold transition">

      Enregistrer les modifications

    </button>



  </form>


</main>





<!-- MODAL PHOTO PROFIL -->
<div
id="avatarModal"
class="hidden fixed inset-0 bg-black/70 items-center justify-center z-50">


  <div class="relative">


    <!-- fermer -->
    <button
      id="closeAvatarModal"
      class="absolute -top-12 right-0 text-white text-4xl hover:scale-110 transition">

      ×

    </button>



    <!-- Grande photo -->
    <div
      id="bigAvatar"
      class="w-80 h-80 rounded-full bg-white overflow-hidden flex items-center justify-center text-7xl font-bold text-blue-600">

    </div>




    <!-- changer photo -->
    <button
      id="changeAvatarBtn"
      class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition">


      <i class="fa-solid fa-camera"></i>

      Modifier la photo


    </button>


  </div>


</div>





<script src="js/api.js"></script>
<script src="js/profile.js"></script>


</body>

</html>
