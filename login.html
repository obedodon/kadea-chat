<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Kadea Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">
  <main class="w-full max-w-md">
    <div class="text-center mb-6">
      <div class="w-12 h-12 mx-auto bg-blue-600 text-white rounded-xl flex items-center justify-center text-2xl mb-3">
        <i class="fa-solid fa-comments"></i>
      </div>
      <h1 class="text-2xl font-bold text-blue-600">Welcome back</h1>
      <p class="text-sm text-slate-500 mt-1">Please enter your details to sign in to Kadea Chat</p>
    </div>

    <section class="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
      <form id="loginForm" class="space-y-4">
        <div>
          <label for="loginEmail" class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
          <input id="loginEmail" type="email" placeholder="name@example.com"
            class="w-full rounded-lg bg-slate-100 border border-slate-200 px-4 py-3 outline-none focus:border-blue-600 focus:bg-white">
        </div>

        <div>
          <div class="flex items-center justify-between mb-1">
            <label for="loginPassword" class="block text-sm font-medium text-slate-700">Password</label>
            <a href="#" class="text-xs text-blue-600 hover:underline">Forgot?</a>
          </div>

          <div class="relative">
            <input id="loginPassword" type="password" placeholder="••••••••"
              class="w-full rounded-lg bg-slate-100 border border-slate-200 px-4 py-3 pr-12 outline-none focus:border-blue-600 focus:bg-white">
            <button type="button" id="toggleLoginPassword" 
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-blue-600">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <p id="loginMessage" class="text-sm text-center font-medium"></p>

        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg py-3 transition">
          Login
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-5">
        Don't have an account?
        <a href="register.html" class="text-blue-600 font-semibold hover:underline">Create Account</a>
      </p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
