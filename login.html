<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Connexion — Kadea Chat</title>

  <!-- Applique immédiatement le thème enregistré -->
  <script>
    (() => {
      const savedTheme = localStorage.getItem("theme");

      const prefersDark =
        window.matchMedia("(prefers-color-scheme: dark)").matches;

      const isDark =
        savedTheme === "dark" ||
        (!savedTheme && prefersDark);

      document.documentElement.classList.toggle("dark", isDark);
    })();
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
    };
  </script>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  >
</head>

<body
  class="flex min-h-screen items-center justify-center bg-slate-50 px-4 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-white"
>
  <main class="w-full max-w-md">

    <!-- En-tête -->
    <header class="mb-6 text-center">
      <div
        class="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded-xl bg-blue-600 text-2xl text-white shadow-lg shadow-blue-600/20"
      >
        <i class="fa-solid fa-comments"></i>
      </div>

      <h1 class="text-2xl font-bold text-blue-600">
        Bon retour
      </h1>

      <p
        class="mt-1 text-sm text-slate-500 dark:text-slate-300"
      >
        Connecte-toi pour accéder à Kadea Chat.
      </p>
    </header>

    <!-- Carte de connexion -->
    <section
      class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition-colors dark:border-slate-700 dark:bg-slate-900"
    >
      <form
        id="loginForm"
        class="space-y-4"
        novalidate
      >

        <!-- Adresse e-mail -->
        <div>
          <label
            for="loginEmail"
            class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200"
          >
            Adresse e-mail
          </label>

          <input
            id="loginEmail"
            name="email"
            type="email"
            required
            autocomplete="email"
            placeholder="nom@exemple.com"
            class="w-full rounded-lg border border-slate-200 bg-slate-100 px-4 py-3 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-600 focus:bg-white focus:ring-2 focus:ring-blue-100 dark:border-slate-700 dark:bg-slate-800 dark:text-white dark:focus:bg-slate-800 dark:focus:ring-blue-900"
          >
        </div>

        <!-- Mot de passe -->
        <div>
          <label
            for="loginPassword"
            class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200"
          >
            Mot de passe
          </label>

          <div class="relative">
            <input
              id="loginPassword"
              name="password"
              type="password"
              required
              autocomplete="current-password"
              placeholder="••••••••"
              class="w-full rounded-lg border border-slate-200 bg-slate-100 px-4 py-3 pr-12 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-600 focus:bg-white focus:ring-2 focus:ring-blue-100 dark:border-slate-700 dark:bg-slate-800 dark:text-white dark:focus:bg-slate-800 dark:focus:ring-blue-900"
            >

            <button
              id="toggleLoginPassword"
              type="button"
              aria-label="Afficher le mot de passe"
              title="Maintenir pour afficher le mot de passe"
              class="absolute right-3 top-1/2 flex h-9 w-9 -translate-y-1/2 items-center justify-center rounded-full text-slate-500 transition hover:bg-slate-200 hover:text-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-slate-300 dark:hover:bg-slate-700"
            >
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Message d’erreur ou de réussite -->
        <p
          id="loginMessage"
          class="min-h-5 text-center text-sm font-medium"
          aria-live="polite"
        ></p>

        <!-- Bouton de connexion -->
        <button
          type="submit"
          class="w-full rounded-lg bg-blue-600 py-3 font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-200 disabled:cursor-not-allowed disabled:opacity-70 dark:focus:ring-blue-900"
        >
          Se connecter
        </button>
      </form>

      <!-- Lien vers l’inscription -->
      <p
        class="mt-5 text-center text-sm text-slate-500 dark:text-slate-300"
      >
        Pas encore de compte ?

        <a
          href="register.html"
          class="font-semibold text-blue-600 transition hover:underline"
        >
          Créer un compte
        </a>
      </p>
    </section>

    <!-- Mention inférieure -->
    <p
      class="mt-5 text-center text-xs text-slate-400 dark:text-slate-500"
    >
      Kadea Chat — Messagerie simple et sécurisée
    </p>
  </main>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
